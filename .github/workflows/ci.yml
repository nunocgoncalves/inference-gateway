name: ci

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"

      # goimports is checked by `make fmt-check` when present; install it so CI
      # actually enforces import grouping (not just gofmt).
      - name: install goimports
        run: go install golang.org/x/tools/cmd/goimports@latest

      - name: gofmt / goimports check
        run: make fmt-check

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

      - name: build
        run: make build

      - name: test
        run: make test
