# Inference Gateway — Example Configuration
#
# Copy this file to gateway.yaml or gateway.local.yaml and adjust values.
# Environment variables in ${...} syntax are expanded at load time.
# Environment variable overrides (DATABASE_URL, REDIS_URL, etc.) take precedence.

server:
  port: 8080
  read_timeout: 30s
  write_timeout: 300s       # Long timeout for streaming responses
  idle_timeout: 120s

database:
  url: "${DATABASE_URL}"    # postgres://user:pass@host:5432/gateway?sslmode=disable
  max_open_conns: 25
  max_idle_conns: 10

redis:
  url: "${REDIS_URL}"       # redis://host:6379/0

auth:
  admin_key: "${ADMIN_API_KEY}"

rate_limits:
  default_rpm: 60           # Default requests per minute per API key
  default_tpm: 100000       # Default tokens per minute per identity (absent per-identity limit)

# The snapshot cache is the gateway's in-memory view of control-plane state
# (catalog, API keys, capabilities, rate-limit limits). Refreshed on start, on
# LISTEN/NOTIFY (catalog_changed/api_keys_changed/permissions_changed), and on
# the poll fallback. Redis is used only for the rate-limit counters.
snapshot:
  refresh_interval: 30s     # Poll fallback (LISTEN/NOTIFY drives prompt updates)
  readiness_staleness: 60s  # /readyz is unhealthy if the snapshot is older than this

logging:
  level: info               # debug, info, warn, error
  format: json              # json or text
